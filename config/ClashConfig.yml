rules:
  - 'RULE-SET,private,直连'
  - 'RULE-SET,private_ip,直连,no-resolve'
  - 'RULE-SET,DownloadApps,下载专用'
  - 'RULE-SET,steam_cn,直连'
  - 'RULE-SET,epicgames,直连'
  - 'RULE-SET,nvidia_cn,直连'
  - 'RULE-SET,microsoft_cn,直连'
  - 'RULE-SET,cloudflare_cn,直连'
  - 'RULE-SET,captcha,人机验证'
  - 'RULE-SET,ai,AI'
  - 'AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,youtube)),REJECT'
  - 'RULE-SET,youtube,YouTube'
  - 'RULE-SET,googlefcm,FCM'
  - 'RULE-SET,google,Google'
  - 'RULE-SET,google_ip,Google,no-resolve'
  - 'RULE-SET,github,GitHub'
  - 'RULE-SET,microsoft,Microsoft'
  - 'RULE-SET,apple,Apple'
  - 'RULE-SET,telegram,Telegram'
  - 'RULE-SET,telegram_ip,Telegram,no-resolve'
  - 'RULE-SET,cloudflare,Cloudflare'
  - 'RULE-SET,cloudflare_ip,Cloudflare,no-resolve'
  - 'RULE-SET,pixiv,Pixiv'
  - 'PROCESS-NAME,com.perol.pixez,Pixiv'
  - 'PROCESS-NAME,com.perol.play.pixez,Pixiv'
  - 'RULE-SET,steam,Steam'
  - 'RULE-SET,twitter,Twitter'
  - 'RULE-SET,twitter_ip,Twitter,no-resolve'
  - 'RULE-SET,instagram,Instagram'
  - 'RULE-SET,emby,Emby'
  - 'RULE-SET,emby_ip,Emby,no-resolve'
  - 'DOMAIN-KEYWORD,emby,Emby'
  - 'RULE-SET,spotify,Spotify'
  - 'RULE-SET,tiktok,TikTok'
  - 'RULE-SET,netflix,Netflix'
  - 'RULE-SET,netflix_ip,Netflix,no-resolve'
  - 'RULE-SET,adblockmihomolite,广告拦截'
  - 'RULE-SET,gfw,默认代理'
  - 'RULE-SET,cn,直连'
  - 'DOMAIN-WILDCARD,*.cn,直连'
  - 'RULE-SET,cn_ip,直连'
  - 'MATCH,默认代理'

dns:
  enable: true
  ipv6: true
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: fc00::/18
  fake-ip-filter:
    - '+.cn'
    - 'rule-set:category_ntp'
    - 'rule-set:fakeip_filter'
    - 'rule-set:connectivity_check'
    - 'rule-set:private'
    - 'rule-set:cn'
    - 'rule-set:googlefcm'
    - 'rule-set:steam_cn'
    - 'rule-set:epicgames'
    - 'rule-set:nvidia_cn'
    - 'rule-set:microsoft_cn'
    - 'rule-set:cloudflare_cn'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query#DIRECT'
    - 'https://dns.alidns.com/dns-query#DIRECT'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'https://1.1.1.1/dns-query#默认代理'
    - 'https://8.8.8.8/dns-query#默认代理'
  nameserver-policy:
    '*': system
    '+.arpa': system
    '+.cn':
      - system
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:private,cn,googlefcm,steam_cn,epicgames,nvidia_cn,microsoft_cn,cloudflare_cn,microsoft,apple,spotify,captcha':
      - system
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  direct-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true

hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  services.googleapis.cn:
    - services.googleapis.com
  '+.mcdn.bilivideo.com':
    - 0.0.0.0
  '+.mcdn.bilivideo.cn':
    - 0.0.0.0

sniffer:
  enable: false
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - Mijia Cloud
    - '+.oray.com'
    - '+.push.apple.com'
    - cloudflare-ech.com
  skip-dst-address:
    - 'rule-set:telegram_ip'

ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 60

tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - udp://any:53
    - tcp://any:53
