allow-lan: true
ipv6: true
bind-address: '*'
mode: rule
unified-delay: true
tcp-concurrent: true
keep-alive-idle: 600
keep-alive-interval: 60
find-process-mode: strict

external-controller: '[::]:9090'
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip

profile:
  store-selected: true
  store-fake-ip: true

proxies: ~
proxy-groups: ~

