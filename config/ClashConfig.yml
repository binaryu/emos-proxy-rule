mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: true

mode: rule
log-level: warning

external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053

  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "time.*"
    - "ntp.*"
    - "stun.*.*"
    - "stun.*.*.*"

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
    - tls://8.8.4.4

  fallback-filter:
    geoip: true
    geoip-code: CN