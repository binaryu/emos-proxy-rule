[common]
api_mode=false
api_access_token=password
default_url=
enable_insert=false
exclude_remarks=群|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|选择|剩余|公益|发布|DIZTNA|通路|登录|禁止|定时|渠道|牢记|永久|余额|阁下|本站|刷新|导航|⚠️|@|Expire|http|com/u
base_path=.
clash_rule_base=https://raw.githubusercontent.com/binaryu/emos-proxy-rule/refs/heads/main/config/ClashConfig.yml
proxy_config=SYSTEM
proxy_ruleset=SYSTEM
proxy_subscription=NONE
reload_conf_on_request=true

[node_pref]
sort_flag=false
append_sub_userinfo=true
clash_use_new_field_name=true
clash_proxies_style=flow
clash_proxy_groups_style=block

[rulesets]
enabled=false
overwrite_original_rules=false
update_ruleset_on_request=false

