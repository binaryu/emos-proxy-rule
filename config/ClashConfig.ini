custom_proxy_group=广告拦截`select`[]REJECT`[]REJECT-DROP`[]PASS
custom_proxy_group=下载专用`select`[]直连`[]默认节点
custom_proxy_group=直连`select`[]🇨🇳 直连（IPv4优先）`[]🇨🇳 直连（IPv6优先）`[]🇨🇳 直连（双栈）

custom_proxy_group=香港`select`[]香港-自动选择`(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))
custom_proxy_group=香港-自动选择`url-test`(?=.*(港|🇭🇰|HK|[Hh]ong\s*[Kk]ong))`https://g.cn/generate_204`600,,100

custom_proxy_group=日本`select`[]日本-自动选择`(?=.*(日本|🇯🇵|JP|[Jj]apan))
custom_proxy_group=日本-自动选择`url-test`(?=.*(日本|🇯🇵|JP|[Jj]apan))`https://g.cn/generate_204`600,,100

custom_proxy_group=美国`select`[]美国-自动选择`(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))
custom_proxy_group=美国-自动选择`url-test`(?=.*(美|🇺🇸|US|[Aa]merica|[Uu]nited\s*[Ss]tates))`https://g.cn/generate_204`600,,100

custom_proxy_group=新加坡`select`[]新加坡-自动选择`(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))
custom_proxy_group=新加坡-自动选择`url-test`(?=.*(新加坡|狮城|🇸🇬|SG|[Ss]ingapore))`https://g.cn/generate_204`600,,100

custom_proxy_group=其他节点`select`^(?!.*(港|HK|🇭🇰|日本|JP|🇯🇵|美|US|🇺🇸|新加坡|SG|🇸🇬|直连)).*
