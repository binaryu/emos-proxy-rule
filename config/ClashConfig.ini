[common]
clash_rule_base=https://raw.githubusercontent.com/binaryu/emos-proxy-rule/refs/heads/main/config/ClashConfig.yml

[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ---------------- 规则分流 ----------------
; 私有网络直连
ruleset=直连,[]RULE-SET,private
ruleset=直连,[]RULE-SET,private_ip,no-resolve

; 国内直连
ruleset=直连,[]RULE-SET,steam_cn
ruleset=直连,[]RULE-SET,epicgames
ruleset=直连,[]RULE-SET,nvidia_cn
ruleset=直连,[]RULE-SET,microsoft_cn
ruleset=直连,[]DOMAIN-SUFFIX,fsend.cn

; 进程规则
ruleset=下载专用,[]RULE-SET,DownloadApps
ruleset=Pixiv,[]PROCESS-NAME,com.perol.pixez
ruleset=Pixiv,[]PROCESS-NAME,com.perol.play.pixez

; 广告拦截
ruleset=广告拦截,[]RULE-SET,adblockmihomolite

; 阻断 YouTube UDP 流量
ruleset=REJECT,[]AND,((NETWORK,UDP),(DST-PORT,443),(RULE-SET,youtube))

; 代理规则（域名）
ruleset=国外AI,[]RULE-SET,ai
ruleset=YouTube,[]RULE-SET,youtube
ruleset=FCM,[]RULE-SET,googlefcm
ruleset=Google,[]RULE-SET,google
ruleset=GitHub,[]RULE-SET,github
ruleset=Microsoft,[]RULE-SET,microsoft
ruleset=Apple,[]RULE-SET,apple
ruleset=Telegram,[]RULE-SET,telegram
ruleset=Cloudflare,[]RULE-SET,cloudflare
ruleset=Pixiv,[]RULE-SET,pixiv
ruleset=Steam,[]RULE-SET,steam
ruleset=Twitter,[]RULE-SET,twitter
ruleset=Emby,[]RULE-SET,emby
ruleset=Emby,[]DOMAIN-KEYWORD,emby
ruleset=Spotify,[]RULE-SET,spotify
ruleset=TikTok,[]RULE-SET,tiktok
ruleset=Netflix,[]RULE-SET,netflix

; 代理规则（IP）
ruleset=Google,[]RULE-SET,google_ip,no-resolve
ruleset=Telegram,[]RULE-SET,telegram_ip,no-resolve
ruleset=Twitter,[]RULE-SET,twitter_ip,no-resolve
ruleset=Cloudflare,[]RULE-SET,cloudflare_ip,no-resolve
ruleset=Emby,[]RULE-SET,emby_ip,no-resolve
ruleset=Netflix,[]RULE-SET,netflix_ip,no-resolve

; 兜底规则
ruleset=默认节点,[]RULE-SET,gfw
ruleset=直连,[]RULE-SET,cn
ruleset=直连,[]RULE-SET,cn_ip
ruleset=默认节点,[]MATCH

; ---------------- 代理分组 (Groups) ----------------
custom_proxy_group=默认节点`select`[]香港`[]日本`[]美国`[]新加坡`[]其他节点

custom_proxy_group=国外AI`select`[]默认节点`[]香港`[]日本`[]美国`[]新加坡`[]其他节点
custom_proxy_group=YouTube`select`[]默认节点`[]香港`[]日本`[]美国`[]新加坡`[]其他节点
