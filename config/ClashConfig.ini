[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ---------------- 规则分流 (基于标签) ----------------
ruleset=AI服务,[]GEOSITE,openai
ruleset=AI服务,[]GEOSITE,google-fcm
ruleset=AI服务,[]DOMAIN-KEYWORD,claude

ruleset=国内服务,[]GEOSITE,geolocation-cn
ruleset=国内服务,[]GEOSITE,cn
ruleset=非中国,[]GEOSITE,geolocation-!cn
ruleset=私有网络,[]GEOIP,private
ruleset=国内服务,[]GEOIP,cn
ruleset=漏网之鱼,[]FINAL

; ---------------- 代理分组 (Groups) ----------------
custom_proxy_group=节点选择`select`[]自动选择`[]DIRECT`.*

custom_proxy_group=AI服务`select`[]🇺🇸 美国节点`[]🇸🇬 新加坡`[]🇯🇵 日本节点`[]节点选择

custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=国内服务`select`[]DIRECT`[]节点选择
custom_proxy_group=非中国`select`[]节点选择`[]自动选择`[]DIRECT
custom_proxy_group=漏网之鱼`select`[]节点选择`[]自动选择`[]DIRECT

custom_proxy_group=🇺🇸 美国节点`select`(美|US|us|United|States|America|lax|Sjc|Sea|LAX|SJC|SEA)
custom_proxy_group=🇸🇬 新加坡`select`(新|坡|SG|sg|Singapore|Sing|SIN|sin)
custom_proxy_group=🇯🇵 日本节点`select`(日|JP|jp|Japan|Jap|Tokyo|日本|东京|大阪|NRT|KIX)