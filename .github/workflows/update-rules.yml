name: Update Rules

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    - cron: "0 18 * * *"

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install mihomo
        run: |
          MIHOMO_URL=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if 'linux-amd64' in a['name'] and a['name'].endswith('.gz') and 'compatible' not in a['name'] and '-v1-' not in a['name'] and '-go' not in a['name']))")
          curl -fSL "$MIHOMO_URL" -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Generate rules
        run: python scripts/generate_rules.py

      - name: Check changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules
          git commit -m "chore: update generated rules"
          git push
