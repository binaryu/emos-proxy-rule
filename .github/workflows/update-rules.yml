name: Update Rules

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron uses UTC.
    # 00:00 UTC and 12:00 UTC == 08:00 and 20:00 Asia/Shanghai
    - cron: "0 0,12 * * *"

env:
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install mihomo
        run: |
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64)  MIHOMO_ARCH="amd64" ;;
            aarch64) MIHOMO_ARCH="arm64" ;;
            *)       echo "Unsupported arch: $ARCH"; exit 1 ;;
          esac
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/Alpha/mihomo-linux-${MIHOMO_ARCH}-alpha.gz" -o mihomo.gz
          gunzip mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Generate rules
        run: python scripts/generate_rules.py

      - name: Check changes
        id: check_changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules
          git commit -m "chore: update generated rules"
          git push
